#$schema: https://squidfunk.github.io/mkdocs-material/schema.json

site_name: Futured iOS Fastlane
site_url: https://futuredapp.github.io/ios-fastlane
theme:
  name: material
  language: en

  custom_dir: docs/overrides

  favicon: assets/images/favicon.png
  icon:
    logo: futured/logo

  font:
    code: JetBrains Mono

  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to auto mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Lanes:
      - Overview: lanes/index.md
      - Provisioning: lanes/provisioning.md
      - Test: lanes/test.md
      - Beta: lanes/beta.md
      - Release: lanes/release.md
      - Create Apps: lanes/create-apps.md
      - GraphQL: lanes/generate-graphql-operations.md
  - Configuration:
      - Overview: configuration/index.md
      - Environment Variables: configuration/env-variables.md
      - Helpers: configuration/helpers.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Customer Accounts: guides/customer-accounts.md

copyright: Made with ❤️‍🔥 at Futured

extra:
  social:
    - icon: material/web
      name: Web
      link: https://www.futured.app
    - icon: fontawesome/brands/github
      name: GitHub
      link: https://www.github.com/futuredapp
    - icon: fontawesome/brands/linkedin
      name: LinkedIn
      link: https://www.linkedin.com/company/futuredapps
    - icon: fontawesome/brands/instagram
      name: Instagram
      link: https://www.instagram.com/futuredapps

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
