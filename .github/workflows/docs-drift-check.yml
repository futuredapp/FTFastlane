name: Documentation Drift Check

on:
  pull_request:
    paths:
      - 'fastlane/Fastfile'

permissions:
  pull-requests: write

jobs:
  check-docs-updated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if custom documentation was updated
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- docs/content/ | wc -l | tr -d ' ')

          if [ "$DOCS_CHANGED" -eq 0 ]; then
            COMMENT_MARKER="<!-- docs-drift-check -->"
            EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq ".comments[].body" | grep -c "$COMMENT_MARKER" || true)

            if [ "$EXISTING" -eq 0 ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body "${COMMENT_MARKER}
          **Documentation Drift Check**

          The Fastfile was modified in this PR but no custom documentation files were updated.

          Lane pages, options tables, and ENV var references are auto-generated from the Fastfile.
          However, please review if any **custom content** in \`docs/content/\` needs updating:
          - \`docs/content/lanes/\` — \"What it does\" steps, notes, and guides per lane
          - \`docs/content/configuration/\` — ENV variable descriptions and helper examples"
            fi
          fi
